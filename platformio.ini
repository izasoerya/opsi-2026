; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32@7.0.1
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
monitor_filters = time
build_flags = 
    -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

[env:pikohidro]
build_src_filter = +<*> -<main.cpp> -<projects/aquaponic/main.cpp> +<projects/pikohidro/main.cpp>
lib_deps =
    ayushsharma82/ElegantOTA@^3.1.7
    ayushsharma82/WebSerial@^2.1.2
    blynkkk/Blynk@^1.3.5
    adafruit/Adafruit SSD1306@^2.5.17
    robtillaart/ADS1X15@^0.6.2

[env:aquaponics]
build_src_filter = +<*> -<main.cpp> -<projects/pikohidro/main.cpp> +<projects/aquaponic/main.cpp>
lib_deps = 
    ayushsharma82/ElegantOTA@^3.1.7
    ayushsharma82/WebSerial@^2.1.2
    blynkkk/Blynk@^1.3.5
    adafruit/Adafruit SSD1306@^2.5.17
    robtillaart/DS18B20@^0.2.7
    robtillaart/ADS1X15@^0.6.2
    artronshop/ArtronShop_BH1750@^1.0.0